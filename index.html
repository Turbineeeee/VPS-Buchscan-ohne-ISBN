<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#16140f">
<title>Bucherfassung</title>
<style>
  :root{
    --bg:#16140f; --panel:#1f1c16; --panel-2:#272219; --line:#383023;
    --ink:#efe9dc; --ink-dim:#a39a85;
    --amber:#e0a72e; --amber-ink:#1a1206;
    --resell:#3f7d4f; --platform:#3a6ea5; --discard:#9a4636;
    --serif:"Iowan Old Style",Palatino,"Book Antiqua",Georgia,serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    --mono:"SF Mono",ui-monospace,Menlo,monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);
    display:flex;flex-direction:column;
    padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);
    overscroll-behavior:none;}
  header{padding:13px 18px 11px;display:flex;align-items:baseline;gap:10px;border-bottom:1px solid var(--line);}
  header h1{font-family:var(--serif);font-size:19px;font-weight:600;margin:0;}
  header .accent{color:var(--amber);}
  header .count{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--ink-dim);}
  header .count b{color:var(--ink);font-size:13px;}

  .tabs{display:flex;gap:8px;padding:10px 14px 4px;}
  .tab{flex:1;text-align:center;padding:10px 6px;border-radius:10px;background:var(--panel);
    border:1px solid var(--line);font-size:13px;font-weight:700;color:var(--ink-dim);}
  .tab.on{background:var(--amber);color:var(--amber-ink);border-color:var(--amber);}

  .pane{display:none;padding:8px 14px 0;}
  .pane.on{display:block;}

  .stage{position:relative;margin:0 0 8px;border-radius:14px;overflow:hidden;background:#000;
    border:1px solid var(--line);aspect-ratio:4/3;}
  #video{width:100%;height:100%;object-fit:cover;display:block;}
  .reticle{position:absolute;inset:0;pointer-events:none;display:flex;align-items:center;justify-content:center;}
  .reticle .frame{width:80%;height:32%;border:2.5px solid var(--amber);border-radius:10px;
    box-shadow:0 0 0 2000px rgba(0,0,0,.35);}
  .stage .hint{position:absolute;left:0;right:0;bottom:10px;text-align:center;font-size:12px;
    color:#e8dcc0;text-shadow:0 1px 4px #000;}
  .stage.idle{display:flex;align-items:center;justify-content:center;}
  .stage.idle .startbtn{background:var(--amber);color:var(--amber-ink);border:none;
    font-size:15px;font-weight:800;padding:14px 22px;border-radius:12px;}

  .uploadbox{border:2px dashed var(--line);border-radius:14px;background:var(--panel);padding:8px;}
  .uprow{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .upslot{position:relative;border:1.5px dashed var(--line);border-radius:8px;background:var(--panel-2);
    aspect-ratio:3/4;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:10px;cursor:pointer;overflow:hidden;}
  .upslot.filled{border-style:solid;border-color:var(--amber);background:#000;}
  .upslot img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#000;}
  .upslot .ul{font-size:12px;color:var(--ink);font-weight:700;}
  .upslot .ud{font-size:10px;color:var(--ink-dim);margin-top:3px;line-height:1.3;}
  .upslot input{position:absolute;inset:0;opacity:0;cursor:pointer;}
  .analyzebtn{margin-top:8px;width:100%;background:var(--amber);color:var(--amber-ink);border:none;
    border-radius:11px;padding:13px;font-size:15px;font-weight:800;}
  .analyzebtn:disabled{opacity:.4;}

  .form{display:flex;flex-direction:column;gap:9px;margin-top:10px;}
  .frow{display:flex;gap:9px;}
  .field{display:flex;flex-direction:column;gap:3px;flex:1;}
  .field label{font-family:var(--mono);font-size:10px;color:var(--ink-dim);text-transform:uppercase;letter-spacing:.08em;}
  .field input{background:var(--panel);border:1px solid var(--line);color:var(--ink);
    border-radius:9px;padding:11px 12px;font-size:16px;width:100%;}
  .field input:focus{border-color:var(--amber);outline:none;}
  .field .euro{position:relative;}
  .field .euro input{padding-left:26px;}
  .field .euro::before{content:'€';position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--ink-dim);font-size:15px;}

  .dispo{display:flex;gap:7px;}
  .dispo button{flex:1;padding:11px 4px;border-radius:9px;border:1.5px solid var(--line);
    background:var(--panel);color:var(--ink-dim);font-size:12px;font-weight:700;}
  .dispo button.on[data-d="resell"]{background:var(--resell);border-color:var(--resell);color:#eafbef;}
  .dispo button.on[data-d="platform"]{background:var(--platform);border-color:var(--platform);color:#eaf3fb;}
  .dispo button.on[data-d="discard"]{background:var(--discard);border-color:var(--discard);color:#fbeae6;}

  .eurolink{display:block;text-align:center;margin-top:4px;font-size:13px;color:var(--amber);text-decoration:none;font-weight:600;padding:8px;}
  .status{font-family:var(--mono);font-size:11px;color:var(--ink-dim);min-height:15px;padding:2px;line-height:1.5;}
  .status.busy{color:var(--amber);}
  .status.err{color:var(--discard);}
  .addbtn{margin-top:2px;background:var(--amber);color:var(--amber-ink);border:none;border-radius:11px;padding:14px;font-size:15px;font-weight:800;width:100%;}
  .addbtn:disabled{opacity:.4;}

  .toast{margin:10px 14px 0;padding:11px 14px;border-radius:11px;background:var(--panel-2);border:1px solid var(--line);font-size:13px;display:none;line-height:1.5;}
  .toast.on{display:block;}
  .toast.ok{border-color:var(--resell);} .toast.bad{border-color:var(--discard);}
  .toast b{color:var(--amber);}

  .listwrap{flex:1;overflow-y:auto;padding:12px 14px 24px;}
  .listhead{display:flex;align-items:center;gap:8px;margin:6px 2px 10px;}
  .listhead h2{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--ink-dim);margin:0;text-transform:uppercase;letter-spacing:.1em;}
  .listhead .exp{margin-left:auto;background:var(--amber);border:none;color:var(--amber-ink);font-size:12px;padding:8px 13px;border-radius:9px;font-weight:800;}
  .listhead .clear{background:none;border:1px solid var(--line);color:var(--ink-dim);font-size:12px;padding:7px 11px;border-radius:9px;}
  .row{display:flex;align-items:center;gap:11px;padding:11px 4px;border-bottom:1px solid var(--line);}
  .row .main{min-width:0;flex:1;}
  .row .title{font-family:var(--serif);font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .row .sub{font-size:11px;color:var(--ink-dim);margin-top:2px;font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .row .price{font-family:var(--serif);font-size:15px;font-weight:600;flex:0 0 auto;}
  .row .dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;}
  .dot.resell{background:var(--resell);} .dot.platform{background:var(--platform);} .dot.discard{background:var(--discard);}
  .row .del{background:none;border:none;color:var(--ink-dim);font-size:18px;padding:4px 6px;flex:0 0 auto;}
  .empty{color:var(--ink-dim);font-size:13px;text-align:center;padding:30px 10px;line-height:1.7;}
  .footer{text-align:center;font-size:10px;color:var(--ink-dim);padding:8px 14px 2px;font-family:var(--mono);line-height:1.6;}
</style>
</head>
<body>

<header>
  <h1>Buch<span class="accent">erfassung</span></h1>
  <div class="count"><b id="cTotal">0</b> erfasst · <b id="cSum">0</b>€</div>
</header>

<div class="tabs">
  <div class="tab on" id="tabScan">📷 Barcode</div>
  <div class="tab" id="tabPhoto">📖 Foto (ohne ISBN)</div>
</div>

<!-- Barcode pane (Foto-Schnappschuss) -->
<div class="pane on" id="paneScan">
  <div class="uploadbox">
    <p style="margin:0 0 8px;font-size:12px;color:var(--ink-dim);line-height:1.5;text-align:center;">Barcode formatfüllend und scharf fotografieren — oder aus der Galerie wählen.</p>
    <label class="analyzebtn" id="barcodeShootLbl" style="display:block;text-align:center;cursor:pointer;">📷 Barcode fotografieren<input type="file" accept="image/*" capture="environment" id="bcCam" hidden></label>
    <label class="analyzebtn" id="barcodePickLbl" style="display:block;text-align:center;cursor:pointer;margin-top:8px;background:var(--panel-2);color:var(--ink);border:1px solid var(--line);">🖼 Aus Galerie wählen<input type="file" accept="image/*" id="bcPick" hidden></label>
  </div>
  <div class="status" id="bcStatus"></div>
  <div class="field"><label>ISBN / EAN</label><input id="sIsbn" inputmode="numeric" placeholder="oder manuell tippen"></div>
</div>

<!-- Photo pane -->
<div class="pane" id="panePhoto">
  <div class="uploadbox">
    <div class="uprow">
      <label class="upslot" id="up1"><div class="ul">Buchdeckel</div><div class="ud">Titel, Autor</div><input type="file" accept="image/*" id="ph1"></label>
      <label class="upslot" id="up2"><div class="ul">Titelblatt</div><div class="ud">Verlag, Jahr</div><input type="file" accept="image/*" id="ph2"></label>
    </div>
    <button class="analyzebtn" id="analyzeBtn" disabled>Mit KI erkennen</button>
  </div>
  <div class="status" id="aiStatus"></div>
</div>

<!-- Shared form (price, disposition, fields) -->
<div style="padding:0 14px;">
  <div class="form" id="sharedForm" style="display:none;">
    <div class="frow">
      <div class="field" style="flex:2"><label>Titel</label><input id="fTitle" placeholder="Buchtitel"></div>
      <div class="field"><label>Jahr</label><input id="fYear" inputmode="numeric" placeholder="—"></div>
    </div>
    <div class="frow">
      <div class="field"><label>Autor</label><input id="fAuthor" placeholder="Autor"></div>
      <div class="field"><label>Auflage</label><input id="fEdition" placeholder="—"></div>
    </div>
    <div class="field"><label>ISBN / EAN</label><input id="fIsbn" inputmode="numeric" placeholder="—"></div>
    <a class="eurolink" id="euroLink" href="#" target="_blank" rel="noopener">→ Wert auf eurobuch prüfen</a>
    <div class="frow">
      <div class="field"><label>Verkaufspreis</label><div class="euro"><input id="fPrice" inputmode="decimal" placeholder="0,00"></div></div>
      <div class="field"><label>Lagerfach</label><input id="fShelf" placeholder="optional"></div>
    </div>
    <div class="field"><label>Verwertung</label>
      <div class="dispo" id="fDispo">
        <button data-d="resell">Weiterverkauf</button>
        <button data-d="platform">Plattformen</button>
        <button data-d="discard">Entsorgen</button>
      </div>
    </div>
    <button class="addbtn" id="addBtn" disabled>Zur Liste hinzufügen</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="listwrap">
  <div class="listhead">
    <h2>Erfasste Bücher</h2>
    <button class="exp" id="expBtn">Excel exportieren</button>
    <button class="clear" id="clearBtn">Leeren</button>
  </div>
  <div id="list"></div>
</div>

<div class="footer">Barcode läuft offline · Foto-Weg nutzt deinen n8n-Server · Excel Spalten B–I</div>

<script src="https://cdn.jsdelivr.net/npm/zxing-wasm@2.1.0/dist/iife/reader/index.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
/* ====== KONFIGURATION ====== */
const WEBHOOK_URL = "https://n8n.srv1772176.hstgr.cloud/webhook/buch-upload";
/* =========================== */

const $=id=>document.getElementById(id);
let books=[];
/* ---- Datenverlust-Schutz: Liste dauerhaft im Gerät sichern ---- */
const STORAGE_KEY='bucherfassung_books_v1';
function saveBooks(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(books)); }
  catch(e){ /* Speicher voll oder gesperrt – still ignorieren */ }
}
function loadBooks(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(raw){ const arr=JSON.parse(raw); if(Array.isArray(arr)) books=arr; }
  }catch(e){ books=[]; }
}
loadBooks();
let activeStream=null, lastDecoded=null, lastTime=0;
let photos={1:null,2:null};
let dispo='';
const dispoLabel={resell:'Weiterverkauf',platform:'Plattformen',discard:'Entsorgen'};

function cleanIsbn(raw){const s=(raw||'').replace(/[^0-9Xx]/g,'').toUpperCase();
  if(v13(s))return s; if(v10(s))return s; return null;}
function v13(s){if(!/^\d{13}$/.test(s))return false;let n=0;for(let i=0;i<13;i++)n+=(+s[i])*(i%2?3:1);return n%10===0;}
function v10(s){if(!/^\d{9}[\dX]$/.test(s))return false;let n=0;for(let i=0;i<10;i++)n+=(s[i]==='X'?10:+s[i])*(10-i);return n%11===0;}

function eurobuchFor({isbn,title,author,year}){
  const i=cleanIsbn(isbn);
  if(i) return `https://www.eurobuch.de/buch/isbn/${i}.html`;
  const p=new URLSearchParams();p.set('mediatype','13');
  if(author)p.set('author',author);
  let t=title||''; if(year)t=(t+' '+year).trim();
  if(t)p.set('title',t);
  return 'https://www.eurobuch.de/search.php?'+p.toString();
}

/* ---- tabs ---- */
$('tabScan').onclick=()=>switchPane('scan');
$('tabPhoto').onclick=()=>switchPane('photo');
function switchPane(p){
  $('tabScan').classList.toggle('on',p==='scan');
  $('tabPhoto').classList.toggle('on',p==='photo');
  $('paneScan').classList.toggle('on',p==='scan');
  $('panePhoto').classList.toggle('on',p==='photo');
  if(p!=='scan') stopCamera();
}

/* ---- barcode via Foto-Schnappschuss (Kamera oder Galerie) ---- */
$('bcCam').addEventListener('change',e=>readBarcodePhoto(e.target.files[0]));
$('bcPick').addEventListener('change',e=>readBarcodePhoto(e.target.files[0]));

async function readBarcodePhoto(file){
  if(!file) return;
  setBc('Barcode wird gelesen …','busy');
  try{
    if(!window.ZXingWASM){ setBc('Scanner lädt noch — gleich nochmal versuchen.','err'); return; }
    const results=await ZXingWASM.readBarcodes(file,{tryHarder:true,formats:['EAN13','EAN8','UPCA','Code128'],maxNumberOfSymbols:1});
    if(results && results.length){
      const isbn=cleanIsbn(results[0].text);
      if(isbn){ $('sIsbn').value=isbn; beep(); setBc('✓ '+isbn,''); onScanned(isbn); return; }
      setBc('Code gelesen, aber keine gültige ISBN. Bitte näher/schärfer fotografieren.','err');
    }else{
      setBc('Kein Barcode erkannt. Barcode größer und schärfer ins Bild, dann erneut.','err');
    }
  }catch(err){
    setBc('Fehler beim Lesen: '+err.message,'err');
  }finally{
    $('bcCam').value=''; $('bcPick').value='';
  }
}
function setBc(m,k){const s=$('bcStatus');s.textContent=m;s.className='status'+(k?' '+k:'');}
$('sIsbn').addEventListener('keydown',e=>{if(e.key==='Enter'){const i=cleanIsbn($('sIsbn').value);if(i)onScanned(i);}});

/* scanned ISBN → fill shared form + lookup title */
async function onScanned(isbn){
  showForm();
  $('fIsbn').value=isbn;$('fTitle').value='';$('fAuthor').value='';$('fYear').value='';
  buildEuro();
  toast(`ISBN <b>${isbn}</b> erkannt`,'ok');
  try{
    const r=await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}`);
    if(r.ok){const d=await r.json();const v=d.items&&d.items[0]&&d.items[0].volumeInfo;
      if(v){$('fTitle').value=v.title?(v.subtitle?v.title+': '+v.subtitle:v.title):'';
        $('fAuthor').value=(v.authors&&v.authors.join(', '))||'';
        $('fYear').value=(v.publishedDate||'').slice(0,4);}}
  }catch(e){}
  buildEuro();refreshAdd();
}

/* ---- photo / AI path ---- */
function hookPhoto(n){
  $('ph'+n).addEventListener('change',e=>{
    const f=e.target.files[0];if(!f)return;photos[n]=f;
    const slot=$('up'+n);slot.classList.add('filled');
    slot.querySelectorAll('.ul,.ud').forEach(el=>el.style.display='none');
    let img=slot.querySelector('img');if(!img){img=document.createElement('img');slot.appendChild(img);}
    img.src=URL.createObjectURL(f);
    $('analyzeBtn').disabled=!(photos[1]&&photos[2]);
  });
}
hookPhoto(1);hookPhoto(2);

$('analyzeBtn').addEventListener('click',async()=>{
  if(!(photos[1]&&photos[2]))return;
  if(WEBHOOK_URL.startsWith('PLATZHALTER')){setAi('Webhook-URL noch nicht eingetragen.','err');return;}
  $('analyzeBtn').disabled=true;setAi('Fotos werden gesendet, KI liest …','busy');
  try{
    const fd=new FormData();
    fd.append('cover',photos[1],photos[1].name||'cover.jpg');
    fd.append('title_page',photos[2],photos[2].name||'title.jpg');
    const resp=await fetch(WEBHOOK_URL,{method:'POST',body:fd});
    if(!resp.ok)throw new Error('Server '+resp.status);
    const data=await resp.json();
    const b=Array.isArray(data)?data[0]:data;   /* n8n liefert oft ein Array */
    const j=b.json?b.json:b;
    showForm();
    $('fTitle').value=j.titel||'';
    $('fAuthor').value=j.autor||'';
    $('fYear').value=j.erscheinungsjahr||'';
    $('fEdition').value=j.auflage||'';
    $('fIsbn').value=j.isbn||'';
    buildEuro();refreshAdd();
    setAi('✓ Erkannt — bitte prüfen, Preis und Verwertung ergänzen.','');
    photos={1:null,2:null};
    [1,2].forEach(n=>{const s=$('up'+n);s.classList.remove('filled');const im=s.querySelector('img');if(im)im.remove();s.querySelectorAll('.ul,.ud').forEach(el=>el.style.display='');});
    $('ph1').value='';$('ph2').value='';$('analyzeBtn').disabled=true;
  }catch(err){
    setAi('Fehler: '+err.message+'. Läuft der Workflow (aktiv)?','err');
    $('analyzeBtn').disabled=!(photos[1]&&photos[2]);
  }
});
function setAi(m,k){const s=$('aiStatus');s.textContent=m;s.className='status'+(k?' '+k:'');}

/* ---- shared form ---- */
function showForm(){$('sharedForm').style.display='flex';}
$('fDispo').querySelectorAll('button').forEach(b=>{
  b.onclick=()=>{$('fDispo').querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');dispo=b.dataset.d;refreshAdd();};
});
['fTitle','fAuthor','fIsbn','fYear'].forEach(id=>$(id).addEventListener('input',()=>{buildEuro();refreshAdd();}));
function buildEuro(){
  $('euroLink').href=eurobuchFor({isbn:$('fIsbn').value,title:$('fTitle').value,author:$('fAuthor').value,year:$('fYear').value});
}
function refreshAdd(){$('addBtn').disabled=!($('fTitle').value.trim() && dispo);}

function parsePrice(s){if(!s)return '';const n=parseFloat(String(s).replace(',','.').replace(/[^0-9.]/g,''));return isNaN(n)?'':n;}

$('addBtn').onclick=()=>{
  const book={
    isbn:cleanIsbn($('fIsbn').value)||$('fIsbn').value.trim(),
    year:$('fYear').value.trim(),edition:$('fEdition').value.trim(),
    author:$('fAuthor').value.trim(),title:$('fTitle').value.trim(),
    shelf:$('fShelf').value.trim(),price:parsePrice($('fPrice').value),dispo
  };
  books.unshift(book);saveBooks();renderList();renderCounts();
  toast(`<b>${esc(book.title)}</b> hinzugefügt`,'ok');
  ['fTitle','fAuthor','fYear','fEdition','fIsbn','fShelf','fPrice','sIsbn'].forEach(id=>{if($(id))$(id).value='';});
  $('fDispo').querySelectorAll('button').forEach(b=>b.classList.remove('on'));dispo='';
  $('sharedForm').style.display='none';setAi('',''); refreshAdd();
};

function renderCounts(){$('cTotal').textContent=books.length;
  const sum=books.reduce((a,b)=>a+(typeof b.price==='number'?b.price:0),0);
  $('cSum').textContent=sum.toFixed(2).replace('.',',');}
function renderList(){
  const el=$('list');
  if(!books.length){el.innerHTML='<div class="empty">Noch keine Bücher erfasst.<br>Barcode scannen oder Foto-Weg nutzen.</div>';return;}
  el.innerHTML=books.map((b,i)=>{
    const meta=[b.isbn,b.year,b.author].filter(Boolean).join(' · ');
    const price=typeof b.price==='number'?b.price.toFixed(2).replace('.',',')+'€':'—';
    return `<div class="row"><span class="dot ${b.dispo}"></span>
      <div class="main"><div class="title">${esc(b.title||'(ohne Titel)')}</div><div class="sub">${esc(meta||'—')}</div></div>
      <span class="price">${price}</span><button class="del" onclick="delBook(${i})">×</button></div>`;
  }).join('');
}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function delBook(i){books.splice(i,1);saveBooks();renderList();renderCounts();}

$('expBtn').onclick=()=>{
  if(!books.length){toast('Keine Bücher zum Exportieren.','bad');return;}
  const header=['','ISBN/EAN','Erscheinungsjahr','Auflage','Autor','Buchtitel','Lagerfach','Preis','Verwertung'];
  const rows=[header];
  books.slice().reverse().forEach(b=>rows.push(['',b.isbn||'',b.year||'',b.edition||'',b.author||'',b.title||'',b.shelf||'',(typeof b.price==='number'?b.price:''),dispoLabel[b.dispo]||'']));
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:3},{wch:16},{wch:14},{wch:8},{wch:22},{wch:34},{wch:10},{wch:9},{wch:14}];
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Bücher');
  XLSX.writeFile(wb,`bucherfassung_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('Excel-Datei erstellt.','ok');
};
$('clearBtn').onclick=()=>{if(confirm('Alle erfassten Bücher löschen?')){books=[];saveBooks();renderList();renderCounts();}};

let tt=null;
function toast(html,kind){const t=$('toast');t.innerHTML=html;t.className='toast on'+(kind?' '+kind:'');clearTimeout(tt);tt=setTimeout(()=>t.className='toast',3500);}
function beep(){try{const ac=new(window.AudioContext||window.webkitAudioContext)();const o=ac.createOscillator(),g=ac.createGain();o.frequency.value=880;o.connect(g);g.connect(ac.destination);g.gain.setValueAtTime(.15,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.15);o.start();o.stop(ac.currentTime+.15);if(navigator.vibrate)navigator.vibrate(50);}catch(e){}}

renderList();renderCounts();
</script>
