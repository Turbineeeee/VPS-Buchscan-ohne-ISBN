<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#16140f">
<title>Bucherfassung</title>
<style>
  :root{
    --bg:#16140f; --panel:#1f1c16; --panel-2:#272219; --line:#383023;
    --ink:#efe9dc; --ink-dim:#a39a85;
    --amber:#e0a72e; --amber-ink:#1a1206;
    --resell:#3f7d4f; --platform:#3a6ea5; --discard:#9a4636;
    --serif:"Iowan Old Style",Palatino,"Book Antiqua",Georgia,serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    --mono:"SF Mono",ui-monospace,Menlo,monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);
    display:flex;flex-direction:column;
    padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);
    overscroll-behavior:none;}
  header{padding:13px 18px 11px;display:flex;align-items:baseline;gap:10px;border-bottom:1px solid var(--line);}
  header h1{font-family:var(--serif);font-size:19px;font-weight:600;margin:0;}
  header .accent{color:var(--amber);}
  header .count{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--ink-dim);}
  header .count b{color:var(--ink);font-size:13px;}

  .tabs{display:flex;gap:8px;padding:10px 14px 4px;}
  .tab{flex:1;text-align:center;padding:10px 6px;border-radius:10px;background:var(--panel);
    border:1px solid var(--line);font-size:13px;font-weight:700;color:var(--ink-dim);}
  .tab.on{background:var(--amber);color:var(--amber-ink);border-color:var(--amber);}

  .pane{display:none;padding:8px 14px 0;}
  .pane.on{display:block;}

  .stage{position:relative;margin:0 0 8px;border-radius:14px;overflow:hidden;background:#000;
    border:1px solid var(--line);aspect-ratio:4/3;}
  #video{width:100%;height:100%;object-fit:cover;display:block;}
  .reticle{position:absolute;inset:0;pointer-events:none;display:flex;align-items:center;justify-content:center;}
  .reticle .frame{width:80%;height:32%;border:2.5px solid var(--amber);border-radius:10px;
    box-shadow:0 0 0 2000px rgba(0,0,0,.35);}
  .stage .hint{position:absolute;left:0;right:0;bottom:10px;text-align:center;font-size:12px;
    color:#e8dcc0;text-shadow:0 1px 4px #000;}
  .stage.idle{display:flex;align-items:center;justify-content:center;}
  .stage.idle .startbtn{background:var(--amber);color:var(--amber-ink);border:none;
    font-size:15px;font-weight:800;padding:14px 22px;border-radius:12px;}

  .uploadbox{border:2px dashed var(--line);border-radius:14px;background:var(--panel);padding:8px;}
  .uprow{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .upslot{position:relative;border:1.5px dashed var(--line);border-radius:8px;background:var(--panel-2);
    aspect-ratio:3/4;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:10px;cursor:pointer;overflow:hidden;}
  .upslot.filled{border-style:solid;border-color:var(--amber);background:#000;}
  .upslot img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#000;}
  .upslot .ul{font-size:12px;color:var(--ink);font-weight:700;}
  .upslot .ud{font-size:10px;color:var(--ink-dim);margin-top:3px;line-height:1.3;}
  .upslot input{position:absolute;inset:0;opacity:0;cursor:pointer;}
  .analyzebtn{margin-top:8px;width:100%;background:var(--amber);color:var(--amber-ink);border:none;
    border-radius:11px;padding:13px;font-size:15px;font-weight:800;}
  .analyzebtn:disabled{opacity:.4;}

  .form{display:flex;flex-direction:column;gap:9px;margin-top:10px;}
  .frow{display:flex;gap:9px;}
  .field{display:flex;flex-direction:column;gap:3px;flex:1;}
  .field label{font-family:var(--mono);font-size:10px;color:var(--ink-dim);text-transform:uppercase;letter-spacing:.08em;}
  .field input{background:var(--panel);border:1px solid var(--line);color:var(--ink);
    border-radius:9px;padding:11px 12px;font-size:16px;width:100%;}
  .field input:focus{border-color:var(--amber);outline:none;}
  .field .euro{position:relative;}
  .field .euro input{padding-left:26px;}
  .field .euro::before{content:'€';position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--ink-dim);font-size:15px;}

  .dispo{display:flex;gap:7px;}
  .dispo button{flex:1;padding:11px 4px;border-radius:9px;border:1.5px solid var(--line);
    background:var(--panel);color:var(--ink-dim);font-size:12px;font-weight:700;}
  .dispo button.on[data-d="resell"]{background:var(--resell);border-color:var(--resell);color:#eafbef;}
  .dispo button.on[data-d="platform"]{background:var(--platform);border-color:var(--platform);color:#eaf3fb;}
  .dispo button.on[data-d="discard"]{background:var(--discard);border-color:var(--discard);color:#fbeae6;}
  #fCondition button.on{background:var(--amber);border-color:var(--amber);color:var(--amber-ink);}
  #fDefects button{padding:9px 11px;border-radius:9px;border:1.5px solid var(--line);
    background:var(--panel);color:var(--ink-dim);font-size:12px;font-weight:700;}
  #fDefects button.on{background:var(--discard);border-color:var(--discard);color:#fbeae6;}

  .eurolink{display:block;text-align:center;margin-top:4px;font-size:13px;color:var(--amber);text-decoration:none;font-weight:600;padding:8px;}
  .status{font-family:var(--mono);font-size:11px;color:var(--ink-dim);min-height:15px;padding:2px;line-height:1.5;}
  .status.busy{color:var(--amber);}
  .status.err{color:var(--discard);}
  .addbtn{margin-top:2px;background:var(--amber);color:var(--amber-ink);border:none;border-radius:11px;padding:14px;font-size:15px;font-weight:800;width:100%;}
  .addbtn:disabled{opacity:.4;}

  .toast{margin:10px 14px 0;padding:11px 14px;border-radius:11px;background:var(--panel-2);border:1px solid var(--line);font-size:13px;display:none;line-height:1.5;}
  .toast.on{display:block;}
  .toast.ok{border-color:var(--resell);} .toast.bad{border-color:var(--discard);}
  .toast b{color:var(--amber);}

  .listwrap{flex:1;overflow-y:auto;padding:12px 14px 24px;}
  .listhead{display:flex;align-items:center;gap:8px;margin:6px 2px 10px;}
  .listhead h2{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--ink-dim);margin:0;text-transform:uppercase;letter-spacing:.1em;}
  .listhead .exp{margin-left:auto;background:var(--amber);border:none;color:var(--amber-ink);font-size:12px;padding:8px 13px;border-radius:9px;font-weight:800;}
  .listhead .clear{background:none;border:1px solid var(--line);color:var(--ink-dim);font-size:12px;padding:7px 11px;border-radius:9px;}
  .row{display:flex;align-items:center;gap:11px;padding:11px 4px;border-bottom:1px solid var(--line);}
  .row .main{min-width:0;flex:1;}
  .row .title{font-family:var(--serif);font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .row .sub{font-size:11px;color:var(--ink-dim);margin-top:2px;font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .row .price{font-family:var(--serif);font-size:15px;font-weight:600;flex:0 0 auto;}
  .row .dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;}
  .dot.resell{background:var(--resell);} .dot.platform{background:var(--platform);} .dot.discard{background:var(--discard);}
  .row .del{background:none;border:none;color:var(--ink-dim);font-size:18px;padding:4px 6px;flex:0 0 auto;}
  .empty{color:var(--ink-dim);font-size:13px;text-align:center;padding:30px 10px;line-height:1.7;}
  .footer{text-align:center;font-size:10px;color:var(--ink-dim);padding:8px 14px 2px;font-family:var(--mono);line-height:1.6;}
</style>
</head>
<body>

<header>
  <h1>Buch<span class="accent">erfassung</span></h1>
  <div class="count"><b id="cTotal">0</b> erfasst · <b id="cSum">0</b>€</div>
</header>

<div class="tabs">
  <div class="tab on" id="tabScan">📷 Barcode</div>
  <div class="tab" id="tabPhoto">📖 Foto (ohne ISBN)</div>
</div>

<!-- Barcode pane (Live-Kamera mit Quagga2) -->
<div class="pane on" id="paneScan">
  <div class="stage idle" id="stage"><button class="startbtn" id="startBtn">📷 Kamera starten</button></div>
  <div class="status" id="bcStatus"></div>
  <div class="field"><label>ISBN / EAN</label>
    <div style="display:flex;gap:8px;">
      <input id="sIsbn" inputmode="numeric" placeholder="oder manuell tippen" style="flex:1;">
      <button id="sIsbnGo" style="display:none;background:var(--amber);color:var(--amber-ink);border:none;border-radius:9px;padding:0 16px;font-size:14px;font-weight:800;white-space:nowrap;">Suchen</button>
    </div>
  </div>
</div>

<!-- Photo pane -->
<div class="pane" id="panePhoto">
  <div class="uploadbox">
    <label class="analyzebtn" id="photoPickLbl" style="display:block;text-align:center;cursor:pointer;">📷 Fotos aufnehmen / wählen<input type="file" accept="image/*" multiple id="phMulti" hidden></label>
    <p style="margin:8px 0 0;font-size:11px;color:var(--ink-dim);line-height:1.5;text-align:center;">Mehrere Fotos auf einmal (Cover, Titelblatt, Impressum) – die KI ordnet selbst zu.</p>
    <div id="phPreview" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;"></div>
    <button class="analyzebtn" id="analyzeBtn" disabled style="margin-top:8px;">Mit KI erkennen</button>
  </div>
  <div class="status" id="aiStatus"></div>
</div>

<!-- Shared form (price, disposition, fields) -->
<div style="padding:0 14px;">
  <div class="form" id="sharedForm" style="display:none;">
    <div class="frow">
      <div class="field" style="flex:2"><label>Titel</label><input id="fTitle" placeholder="Buchtitel"></div>
      <div class="field"><label>Jahr</label><input id="fYear" inputmode="numeric" placeholder="—"></div>
    </div>
    <div class="frow">
      <div class="field"><label>Autor</label><input id="fAuthor" placeholder="Autor"></div>
      <div class="field"><label>Auflage</label><input id="fEdition" placeholder="—"></div>
    </div>
    <div class="field"><label>ISBN / EAN</label><input id="fIsbn" inputmode="numeric" placeholder="—"></div>
    <div style="display:flex;gap:8px;margin-top:4px;">
      <a class="eurolink" id="euroLink" href="#" target="_blank" rel="noopener" style="flex:1;border:1px solid var(--line);border-radius:9px;">→ eurobuch (Wert)</a>
      <a class="eurolink" id="bonaLink" href="#" target="_blank" rel="noopener" style="flex:1;border:1px solid var(--line);border-radius:9px;">→ Bonavendi (Ankauf)</a>
    </div>
    <div class="frow">
      <div class="field"><label>Verkaufspreis</label><div class="euro"><input id="fPrice" inputmode="decimal" placeholder="0,00"></div></div>
      <div class="field"><label>Lagerfach</label><input id="fShelf" placeholder="optional"></div>
    </div>
    <div class="field"><label>Verwertung</label>
      <div class="dispo" id="fDispo">
        <button data-d="resell">Weiterverkauf</button>
        <button data-d="platform">Plattformen</button>
        <button data-d="discard">Entsorgen</button>
      </div>
    </div>

    <div id="conditionBlock" style="display:none;">
      <div class="field"><label>Zustand</label>
        <div class="dispo" id="fCondition" style="flex-wrap:wrap;">
          <button data-c="1" style="flex:1 1 45%;">Wie neu</button>
          <button data-c="2" style="flex:1 1 45%;">Sehr gut</button>
          <button data-c="3" style="flex:1 1 45%;">Gut</button>
          <button data-c="4" style="flex:1 1 45%;">Befriedigend</button>
        </div>
      </div>
      <div class="field"><label>Mängel (Mehrfachauswahl)</label>
        <div id="fDefects" style="display:flex;flex-wrap:wrap;gap:7px;">
          <button data-def="exlibris">Ex libris</button>
          <button data-def="widmung">Pers. Widmung</button>
          <button data-def="seitenlose">Seiten lose</button>
          <button data-def="einband">Einband berieben</button>
          <button data-def="nachgedunkelt">Seiten nachgedunkelt</button>
          <button data-def="mark1">Markierung leicht</button>
          <button data-def="mark2">Markierung mittel</button>
          <button data-def="mark3">Markierung schwer</button>
        </div>
      </div>
    </div>

    <button class="addbtn" id="addBtn" disabled>Zur Liste hinzufügen</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="listwrap">
  <div class="listhead">
    <h2>Erfasste Bücher</h2>
    <button class="exp" id="expBtn">Excel exportieren</button>
    <button class="clear" id="clearBtn">Leeren</button>
  </div>
  <div id="list"></div>
</div>

<div class="footer">Barcode läuft offline · Foto-Weg nutzt deinen n8n-Server · Excel Spalten B–I</div>

<script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.8.4/dist/quagga.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
/* ====== KONFIGURATION ====== */
const WEBHOOK_URL = "https://n8n.srv1772176.hstgr.cloud/webhook/buch-upload";
/* =========================== */

const $=id=>document.getElementById(id);
let books=[];
/* ---- Datenverlust-Schutz: Liste dauerhaft im Gerät sichern ---- */
const STORAGE_KEY='bucherfassung_books_v1';
function saveBooks(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(books)); }
  catch(e){ /* Speicher voll oder gesperrt – still ignorieren */ }
}
function loadBooks(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(raw){ const arr=JSON.parse(raw); if(Array.isArray(arr)) books=arr; }
  }catch(e){ books=[]; }
}
loadBooks();
let activeStream=null, lastDecoded=null, lastTime=0;
let photos=[];
let dispo='';
const dispoLabel={resell:'Weiterverkauf',platform:'Plattformen',discard:'Entsorgen'};

function cleanIsbn(raw){const s=(raw||'').replace(/[^0-9Xx]/g,'').toUpperCase();
  if(v13(s))return s; if(v10(s))return s; return null;}
function v13(s){if(!/^\d{13}$/.test(s))return false;let n=0;for(let i=0;i<13;i++)n+=(+s[i])*(i%2?3:1);return n%10===0;}
function v10(s){if(!/^\d{9}[\dX]$/.test(s))return false;let n=0;for(let i=0;i<10;i++)n+=(s[i]==='X'?10:+s[i])*(10-i);return n%11===0;}

function eurobuchFor({isbn,title,author,year}){
  const i=cleanIsbn(isbn);
  if(i) return `https://www.eurobuch.de/buch/isbn/${i}.html?order=price&mode=p`;
  const p=new URLSearchParams();p.set('mediatype','13');
  if(author)p.set('author',author);
  let t=title||''; if(year)t=(t+' '+year).trim();
  if(t)p.set('title',t);
  p.set('order','price');
  return 'https://www.eurobuch.de/search.php?'+p.toString();
}

/* ---- tabs ---- */
$('tabScan').onclick=()=>switchPane('scan');
$('tabPhoto').onclick=()=>switchPane('photo');
function switchPane(p){
  $('tabScan').classList.toggle('on',p==='scan');
  $('tabPhoto').classList.toggle('on',p==='photo');
  $('paneScan').classList.toggle('on',p==='scan');
  $('panePhoto').classList.toggle('on',p==='photo');
  if(p!=='scan' && typeof stopScan==='function' && quaggaRunning) stopScan();
}

/* ---- barcode via Live-Kamera mit Quagga2 ---- */
let quaggaRunning=false, torchTrack=null, torchOn=false;
$('startBtn').onclick=startScan;

function startScan(){
  $('stage').className='stage';
  $('stage').innerHTML='<div id="qbox" style="width:100%;height:100%;"></div>'
    +'<div class="reticle"><div class="frame"></div></div>'
    +'<button id="torchBtn" style="display:none;position:absolute;top:10px;right:10px;z-index:5;background:rgba(0,0,0,.55);color:#fff;border:1px solid rgba(255,255,255,.4);border-radius:10px;padding:8px 12px;font-size:13px;font-weight:700;">🔦 Licht</button>'
    +'<div class="hint">Barcode in den Rahmen halten</div>';
  setBc('Kamera startet …','busy');
  if(!window.Quagga){ setBc('Scanner-Bibliothek nicht geladen.','err'); return; }
  Quagga.init({
    inputStream:{
      type:'LiveStream',
      target:document.getElementById('qbox'),
      constraints:{ facingMode:'environment' }   /* keine feste Auflösung -> kein Zoom-Beschnitt */
    },
    locator:{ patchSize:'large', halfSample:false },
    numOfWorkers:(navigator.hardwareConcurrency||2),
    frequency:10,
    decoder:{ readers:['ean_reader','ean_8_reader','upc_reader','upc_e_reader'] },
    locate:true
  }, err=>{
    if(err){ setBc('Kamera-Fehler: '+err.message+' (Kamerazugriff erlaubt?)','err'); return; }
    Quagga.start(); quaggaRunning=true; setBc('Bereit — Barcode in den Rahmen halten.','');
    setupTorch();
  });

  let hitCount={}, lastCode=null, lastT=0;
  Quagga.offDetected();
  Quagga.onDetected(result=>{
    const code=result && result.codeResult && result.codeResult.code;
    if(!code) return;
    hitCount[code]=(hitCount[code]||0)+1;
    if(hitCount[code]<2) return;
    const isbn=cleanIsbn(code);
    if(!isbn) return;
    const now=Date.now();
    if(isbn===lastCode && now-lastT<3000) return;
    lastCode=isbn; lastT=now; hitCount={};
    $('sIsbn').value=isbn; beep(); setBc('✓ '+isbn,'');
    // eurobuch sofort öffnen (ISBN reicht für den Link) – noch im Erkennungsmoment
    const ebUrl=eurobuchFor({isbn:isbn});
    const ebWin=window.open(ebUrl,'_blank');
    euroAlreadyOpened=true;
    if(!ebWin || ebWin.closed || typeof ebWin.closed==='undefined'){ euroBlocked=true; euroAlreadyOpened=false; }
    stopScan();
    onScanned(isbn);
  });
}

/* Taschenlampe: nur anzeigen wenn das Gerät sie unterstützt (oft nur Android) */
function setupTorch(){
  try{
    const stream=Quagga.CameraAccess && Quagga.CameraAccess.getActiveStreamLabel ? null : null;
    const tracks=(Quagga.CameraAccess && Quagga.CameraAccess.getActiveTrack) ? [Quagga.CameraAccess.getActiveTrack()] : [];
    let track=tracks[0];
    if(!track){
      // Fallback: aus dem Video-Element den Track holen
      const v=document.querySelector('#qbox video');
      if(v && v.srcObject) track=v.srcObject.getVideoTracks()[0];
    }
    if(!track || !track.getCapabilities) return;
    const caps=track.getCapabilities();
    if(caps && caps.torch){
      torchTrack=track;
      const btn=$('torchBtn');
      if(btn){ btn.style.display='block'; btn.onclick=toggleTorch; }
    }
  }catch(e){ /* Taschenlampe nicht verfügbar – Knopf bleibt versteckt */ }
}
function toggleTorch(){
  if(!torchTrack) return;
  torchOn=!torchOn;
  torchTrack.applyConstraints({advanced:[{torch:torchOn}]})
    .then(()=>{ const b=$('torchBtn'); if(b) b.style.background=torchOn?'rgba(224,167,46,.85)':'rgba(0,0,0,.55)'; })
    .catch(()=>{ setBc('Taschenlampe nicht steuerbar auf diesem Gerät.','err'); });
}

function stopScan(){
  if(quaggaRunning && window.Quagga){ try{Quagga.stop();}catch(e){} quaggaRunning=false; }
  torchTrack=null; torchOn=false;
  $('stage').className='stage idle';
  $('stage').innerHTML='<button class="startbtn" id="startBtn">📷 Kamera starten</button>';
  $('startBtn').onclick=startScan;
}
function setBc(m,k){const s=$('bcStatus');s.textContent=m;s.className='status'+(k?' '+k:'');}
$('sIsbn').addEventListener('keydown',e=>{if(e.key==='Enter'){const i=cleanIsbn($('sIsbn').value);if(i)onScanned(i);}});
// Button nur zeigen, wenn manuell getippt wird
$('sIsbn').addEventListener('input',()=>{
  $('sIsbnGo').style.display = $('sIsbn').value.trim() ? 'block' : 'none';
});
$('sIsbnGo').addEventListener('click',()=>{
  const i=cleanIsbn($('sIsbn').value);
  if(i){ onScanned(i); }
  else { setBc('Bitte eine gültige ISBN/EAN eingeben.','err'); }
});

/* scanned ISBN → fill shared form + lookup title */
const ISBN_LOOKUP_URL = "https://n8n.srv1772176.hstgr.cloud/webhook/isbn-lookup";
let lastCover='', lastSeiten='', lastSprache='';
let euroBlocked=false, euroAlreadyOpened=false;

async function onScanned(isbn){
  showForm();
  $('fIsbn').value=isbn;$('fTitle').value='';$('fAuthor').value='';$('fYear').value='';
  lastCover='';lastSeiten='';lastSprache='';
  buildEuro();
  toast(`ISBN <b>${isbn}</b> erkannt`,'ok');
  setBc('Suche Buchdaten …','busy');
  try{
    const r=await fetch(`${ISBN_LOOKUP_URL}?isbn=${encodeURIComponent(isbn)}`);
    if(!r.ok) throw new Error('Server '+r.status);
    const d=await r.json();
    if(d && d.gefunden){
      $('fTitle').value=d.titel||'';
      $('fAuthor').value=d.autor||'';
      $('fYear').value=d.erscheinungsjahr||'';
      lastCover=d.cover||'';
      lastSeiten=d.seiten||'';
      lastSprache=d.sprache||'';
      buildEuro(); refreshAdd();
      showCoverPreview(lastCover);
      setBc('✓ '+($('fTitle').value||'gefunden')+(d.quelle?' ('+d.quelle+')':''),'');
      if(!euroAlreadyOpened) openEurobuch();
    }else{
      buildEuro(); refreshAdd();
      setBc('Nicht in den Datenbanken (häufig bei alten/seltenen Büchern) — Titel manuell ergänzen.','err');
      if(!euroAlreadyOpened) openEurobuch();
    }
  }catch(err){
    buildEuro(); refreshAdd();
    setBc('Keine Verbindung zum Buchdaten-Dienst — Titel manuell ergänzen.','err');
  }
  // Falls beim Scan blockiert: Link auffällig hervorheben
  if(euroBlocked){ highlightEuroLink(); euroBlocked=false; }
  euroAlreadyOpened=false;
}

function showCoverPreview(url){
  let box=$('coverPreview');
  if(!url){ if(box) box.style.display='none'; return; }
  if(!box){
    box=document.createElement('img');
    box.id='coverPreview';
    box.style.cssText='display:block;max-height:120px;border-radius:8px;margin:4px auto 0;border:1px solid var(--line);';
    const form=$('sharedForm'); form.insertBefore(box, form.firstChild);
  }
  box.src=url; box.style.display='block';
  box.onerror=()=>{ box.style.display='none'; };
}

/* ---- photo / AI path (Mehrfach-Upload, KI ordnet selbst zu) ---- */
$('phMulti').addEventListener('change',e=>{
  const files=Array.from(e.target.files||[]);
  files.forEach(f=>{ if(f && f.type.startsWith('image/')) photos.push(f); });
  renderPhotoPreview();
  $('phMulti').value='';
});

function renderPhotoPreview(){
  const box=$('phPreview');
  box.innerHTML='';
  photos.forEach((f,i)=>{
    const wrap=document.createElement('div');
    wrap.style.cssText='position:relative;width:60px;height:80px;border-radius:6px;overflow:hidden;border:1px solid var(--line);';
    const img=document.createElement('img');
    img.src=URL.createObjectURL(f);
    img.style.cssText='width:100%;height:100%;object-fit:cover;';
    const del=document.createElement('button');
    del.textContent='×';
    del.style.cssText='position:absolute;top:2px;right:2px;background:rgba(0,0,0,.65);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:14px;line-height:1;cursor:pointer;';
    del.onclick=()=>{ photos.splice(i,1); renderPhotoPreview(); };
    wrap.appendChild(img); wrap.appendChild(del);
    box.appendChild(wrap);
  });
  $('analyzeBtn').disabled = photos.length===0;
}

$('analyzeBtn').addEventListener('click',async()=>{
  if(photos.length===0)return;
  if(WEBHOOK_URL.startsWith('PLATZHALTER')){setAi('Webhook-URL noch nicht eingetragen.','err');return;}
  $('analyzeBtn').disabled=true;setAi(`${photos.length} Foto(s) werden gesendet, KI liest …`,'busy');
  try{
    const fd=new FormData();
    // Alle Fotos als bild1, bild2, … schicken – die KI ordnet selbst zu
    photos.forEach((f,i)=>{ fd.append('bild'+(i+1),f,f.name||('bild'+(i+1)+'.jpg')); });
    fd.append('anzahl',String(photos.length));
    const resp=await fetch(WEBHOOK_URL,{method:'POST',body:fd});
    if(!resp.ok)throw new Error('Server '+resp.status);
    const data=await resp.json();
    const b=Array.isArray(data)?data[0]:data;
    const j=b.json?b.json:b;
    showForm();
    $('fTitle').value=j.titel||'';
    $('fAuthor').value=j.autor||'';
    $('fYear').value=j.erscheinungsjahr||'';
    $('fEdition').value=j.auflage||'';
    $('fIsbn').value=j.isbn||'';
    buildEuro();refreshAdd();
    setAi('✓ Erkannt — bitte prüfen, Preis und Verwertung ergänzen.','');
    photos=[]; renderPhotoPreview();
  }catch(err){
    setAi('Fehler: '+err.message+'. Läuft der Workflow (aktiv)?','err');
    $('analyzeBtn').disabled=photos.length===0;
  }
});
function setAi(m,k){const s=$('aiStatus');s.textContent=m;s.className='status'+(k?' '+k:'');}

/* ---- shared form ---- */
function showForm(){$('sharedForm').style.display='flex';}
$('fDispo').querySelectorAll('button').forEach(b=>{
  b.onclick=()=>{
    $('fDispo').querySelectorAll('button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');dispo=b.dataset.d;
    // Zustand + Mängel nur bei Weiterverkauf
    $('conditionBlock').style.display = (dispo==='resell') ? 'block' : 'none';
    refreshAdd();
  };
});

// Zustand: nur einer wählbar
let condition='';
$('fCondition').querySelectorAll('button').forEach(b=>{
  b.onclick=()=>{
    const was=b.classList.contains('on');
    $('fCondition').querySelectorAll('button').forEach(x=>x.classList.remove('on'));
    if(!was){ b.classList.add('on'); condition=b.dataset.c; } else { condition=''; }
    refreshAdd();
  };
});

// Mängel: mehrere wählbar (Toggle)
let defects=new Set();
$('fDefects').querySelectorAll('button').forEach(b=>{
  b.onclick=()=>{
    const key=b.dataset.def;
    if(defects.has(key)){ defects.delete(key); b.classList.remove('on'); }
    else { defects.add(key); b.classList.add('on'); }
  };
});

['fTitle','fAuthor','fIsbn','fYear'].forEach(id=>$(id).addEventListener('input',()=>{buildEuro();refreshAdd();}));
function bonavendiFor(isbn){
  const i=cleanIsbn(isbn);
  if(!i) return 'https://www.bonavendi.de/verkaufen/buecher/';
  return 'https://www.bonavendi.de/verkaufen/buecher/?searchText='+i;
}
function buildEuro(){
  const el=$('euroLink');
  el.href=eurobuchFor({isbn:$('fIsbn').value,title:$('fTitle').value,author:$('fAuthor').value,year:$('fYear').value});
  // Hervorhebung zurücksetzen
  el.style.background=''; el.style.color=''; el.style.fontWeight='';
  el.textContent='→ eurobuch (Wert)';
  // Bonavendi-Link setzen
  const bl=$('bonaLink');
  if(bl) bl.href=bonavendiFor($('fIsbn').value);
}
function openEurobuch(){
  const url=eurobuchFor({isbn:$('fIsbn').value,title:$('fTitle').value,author:$('fAuthor').value,year:$('fYear').value});
  const win=window.open(url,'_blank');
  if(!win || win.closed || typeof win.closed==='undefined'){ highlightEuroLink(); }
}
function highlightEuroLink(){
  const el=$('euroLink');
  el.style.background='var(--amber)';
  el.style.color='var(--amber-ink)';
  el.style.borderRadius='9px';
  el.style.fontWeight='800';
  el.textContent='→ eurobuch öffnen (tippen)';
}
function refreshAdd(){$('addBtn').disabled=!($('fTitle').value.trim() && dispo);}

function parsePrice(s){if(!s)return '';const n=parseFloat(String(s).replace(',','.').replace(/[^0-9.]/g,''));return isNaN(n)?'':n;}

$('addBtn').onclick=()=>{
  const book={
    isbn:cleanIsbn($('fIsbn').value)||$('fIsbn').value.trim(),
    year:$('fYear').value.trim(),edition:$('fEdition').value.trim(),
    author:$('fAuthor').value.trim(),title:$('fTitle').value.trim(),
    shelf:$('fShelf').value.trim(),price:parsePrice($('fPrice').value),dispo,
    cover:lastCover,pages:lastSeiten,language:lastSprache,
    condition:(dispo==='resell'?condition:''),
    defects:(dispo==='resell'?Array.from(defects):[])
  };
  books.unshift(book);saveBooks();renderList();renderCounts();
  toast(`<b>${esc(book.title)}</b> hinzugefügt`,'ok');
  ['fTitle','fAuthor','fYear','fEdition','fIsbn','fShelf','fPrice','sIsbn'].forEach(id=>{if($(id))$(id).value='';});
  lastCover='';lastSeiten='';lastSprache='';showCoverPreview('');
  $('fDispo').querySelectorAll('button').forEach(b=>b.classList.remove('on'));dispo='';
  $('fCondition').querySelectorAll('button').forEach(b=>b.classList.remove('on'));condition='';
  $('fDefects').querySelectorAll('button').forEach(b=>b.classList.remove('on'));defects.clear();
  $('conditionBlock').style.display='none';
  $('sIsbnGo').style.display='none';
  $('sharedForm').style.display='none';setAi('',''); refreshAdd();
};

function renderCounts(){$('cTotal').textContent=books.length;
  const sum=books.reduce((a,b)=>a+(typeof b.price==='number'?b.price:0),0);
  $('cSum').textContent=sum.toFixed(2).replace('.',',');}
function renderList(){
  const el=$('list');
  if(!books.length){el.innerHTML='<div class="empty">Noch keine Bücher erfasst.<br>Barcode scannen oder Foto-Weg nutzen.</div>';return;}
  el.innerHTML=books.map((b,i)=>{
    const meta=[b.isbn,b.year,b.author].filter(Boolean).join(' · ');
    const price=typeof b.price==='number'?b.price.toFixed(2).replace('.',',')+'€':'—';
    const thumb=b.cover?`<img src="${esc(b.cover)}" style="width:34px;height:48px;object-fit:cover;border-radius:4px;flex:0 0 auto;background:var(--panel-2);" onerror="this.style.display='none'">`:'';
    return `<div class="row"><span class="dot ${b.dispo}"></span>${thumb}
      <div class="main"><div class="title">${esc(b.title||'(ohne Titel)')}</div><div class="sub">${esc(meta||'—')}</div></div>
      <span class="price">${price}</span><button class="del" onclick="delBook(${i})">×</button></div>`;
  }).join('');
}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function delBook(i){books.splice(i,1);saveBooks();renderList();renderCounts();}

$('expBtn').onclick=()=>{
  if(!books.length){toast('Keine Bücher zum Exportieren.','bad');return;}
  // Spaltenindex: 0=A leer,1=B ISBN,2=C Jahr,3=D Auflage,4=E Autor,5=F Titel,
  // 6=G Lagerfach,7=H Preis,8=I Verwertung,9=J Seiten,10=K Sprache,11=L Zustand,
  // 14=O Ex libris/Widmung, 16=Q Markierung, 18=S Textmängel
  const header=[];
  header[0]='';header[1]='ISBN/EAN';header[2]='Erscheinungsjahr';header[3]='Auflage';
  header[4]='Autor';header[5]='Buchtitel';header[6]='Lagerfach';header[7]='Preis';
  header[8]='Verwertung';header[9]='Seiten';header[10]='Sprache';header[11]='Zustand';
  header[14]='Anmerkung';header[16]='Markierung';header[18]='Mängel';
  for(let i=0;i<19;i++) if(header[i]===undefined) header[i]='';
  const rows=[header];

  books.slice().reverse().forEach(b=>{
    const def=b.defects||[];
    const row=new Array(19).fill('');
    row[1]=b.isbn||'';
    row[2]=b.year||'';
    row[3]=b.edition||'';
    row[4]=b.author||'';
    row[5]=b.title||'';
    row[6]=b.shelf||'';
    row[7]=(typeof b.price==='number'?b.price:'');
    row[8]=dispoLabel[b.dispo]||'';
    row[9]=b.pages||'';
    row[10]=b.language||'';
    row[11]=b.condition||'';                       // L: Zustand 1-4
    // O (14): Ex libris="2", Pers. Widmung="1"
    if(def.includes('widmung')) row[14]='1';
    if(def.includes('exlibris')) row[14]='2';
    // Q (16): Markierung leicht/mittel/schwer
    if(def.includes('mark1')) row[16]='1';
    if(def.includes('mark2')) row[16]='2';
    if(def.includes('mark3')) row[16]='3';
    // S (18): Textmängel, mit ", " getrennt
    const sParts=[];
    if(def.includes('seitenlose')) sParts.push('Seiten lose');
    if(def.includes('einband')) sParts.push('Einband berieben');
    if(def.includes('nachgedunkelt')) sParts.push('Seiten nachgedunkelt');
    row[18]=sParts.join(', ');
    rows.push(row);
  });

  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:3},{wch:16},{wch:14},{wch:8},{wch:22},{wch:34},{wch:10},{wch:9},{wch:14},{wch:8},{wch:12},{wch:9},{wch:4},{wch:4},{wch:14},{wch:4},{wch:12},{wch:4},{wch:28}];
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Bücher');
  XLSX.writeFile(wb,`bucherfassung_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('Excel-Datei erstellt.','ok');
};
$('clearBtn').onclick=()=>{
  if(!books.length){ toast('Liste ist bereits leer.','bad'); return; }
  showClearConfirm();
};
function showClearConfirm(){
  let ov=document.getElementById('clearOverlay');
  if(ov) ov.remove();
  ov=document.createElement('div');
  ov.id='clearOverlay';
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px;';
  ov.innerHTML=`<div style="background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:22px;max-width:340px;width:100%;">
    <div style="font-family:var(--serif);font-size:18px;font-weight:600;color:var(--ink);margin-bottom:8px;">Alle Bücher löschen?</div>
    <div style="font-size:13px;color:var(--ink-dim);line-height:1.5;margin-bottom:18px;">${books.length} erfasste Bücher werden endgültig gelöscht. Hast du vorher exportiert?</div>
    <div style="display:flex;gap:10px;">
      <button id="clearCancel" style="flex:1;background:var(--panel-2);color:var(--ink);border:1px solid var(--line);border-radius:9px;padding:12px;font-size:14px;font-weight:700;">Abbrechen</button>
      <button id="clearYes" style="flex:1;background:var(--discard);color:#fbeae6;border:none;border-radius:9px;padding:12px;font-size:14px;font-weight:800;">Löschen</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  document.getElementById('clearCancel').onclick=()=>ov.remove();
  document.getElementById('clearYes').onclick=()=>{
    books=[];saveBooks();renderList();renderCounts();
    ov.remove();
    toast('Alle Bücher gelöscht.','ok');
  };
}

let tt=null;
function toast(html,kind){const t=$('toast');t.innerHTML=html;t.className='toast on'+(kind?' '+kind:'');clearTimeout(tt);tt=setTimeout(()=>t.className='toast',3500);}
function beep(){try{const ac=new(window.AudioContext||window.webkitAudioContext)();const o=ac.createOscillator(),g=ac.createGain();o.frequency.value=880;o.connect(g);g.connect(ac.destination);g.gain.setValueAtTime(.15,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.15);o.start();o.stop(ac.currentTime+.15);if(navigator.vibrate)navigator.vibrate(50);}catch(e){}}

renderList();renderCounts();
</script>
